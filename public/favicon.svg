<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ns-grad" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(16 60% 60%)" stop-opacity="1" />
      <stop offset="100%" stop-color="hsl(32 47% 61%)" stop-opacity="1" />
    </linearGradient>
    <radialGradient id="ns-fill" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="hsl(16 60% 60%)" stop-opacity="0.22" />
      <stop offset="55%" stop-color="hsl(32 47% 61%)" stop-opacity="0.10" />
      <stop offset="100%" stop-color="hsl(32 47% 61%)" stop-opacity="0.02" />
    </radialGradient>
  </defs>

  <!-- Transparent background; favicon uses only the mark -->
  <circle cx="256" cy="256" r="214" fill="url(#ns-fill)" />
  <circle cx="256" cy="256" r="206" fill="none" stroke="url(#ns-grad)" stroke-width="18" opacity="0.9" />

  <!-- Center monogram -->
  <text
    x="256"
    y="320"
    text-anchor="middle"
    font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif"
    font-size="240"
    font-weight="800"
    fill="hsl(41 36% 92%)"
    letter-spacing="-8"
  >
    S
  </text>
</svg>

